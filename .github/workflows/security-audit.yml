# Security Audit — weekly + dependency changes on main
name: Security Audit

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      audit_level:
        description: Audit level
        required: true
        default: full
        type: choice
        options:
          - quick
          - standard
          - full
  push:
    branches: [main]
    paths:
      - peer-care-connect/package.json
      - peer-care-connect/package-lock.json
      - package.json
      - package-lock.json
      - .github/workflows/security-audit.yml

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./peer-care-connect
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: peer-care-connect/package-lock.json
      - run: npm ci
      - name: npm audit (production, moderate+)
        run: npm audit --audit-level=moderate --production
      - name: Generate audit reports
        if: always()
        run: |
          npm audit --json > audit-report.json || true
          npm audit --production --json > audit-production.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: |
            peer-care-connect/audit-report.json
            peer-care-connect/audit-production.json
          retention-days: 90

  code-security-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "1"
          ignore-unfixed: false
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          wait-for-processing: true

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
          exit-code: 1
          no-git: false
          verbose: true

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./peer-care-connect
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - uses: CycloneDX/gh-action-generate-sbom@v1
        with:
          path: ./peer-care-connect
          output: sbom.json
          output-format: json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: peer-care-connect/sbom.json
          retention-days: 365

  security-summary:
    name: Security Audit Summary
    runs-on: ubuntu-latest
    needs:
      [dependency-audit, code-security-scan, secret-scanning, sbom-generation]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency audit: ${{ needs.dependency-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy: ${{ needs.code-security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Gitleaks: ${{ needs.secret-scanning.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SBOM: ${{ needs.sbom-generation.result }}" >> $GITHUB_STEP_SUMMARY
